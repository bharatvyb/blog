<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NestCloud Waitlist</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f3ef;
    color: #0b6662;
    text-align: center;
}

.hero {
    padding: 60px 20px;
}

h1 {
    font-size: 64px;
    font-weight: 700;
    margin-bottom: 30px;
}

.subtitle {
    font-size: 26px;
    margin-bottom: 70px;
}

.waitlist-box {
    max-width: 700px;
    margin: auto;
    border: 3px solid #0b6662;
    border-radius: 30px;
    padding: 60px;
    background: transparent;
}

.waitlist-box h2 {
    font-size: 54px;
    margin-bottom: 40px;
}

label {
    display: block;
    text-align: left;
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 16px;
}

input {
    width: 100%;
    padding: 22px;
    border-radius: 16px;
    border: 2px solid #7aa9a7;
    font-size: 20px;
    box-sizing: border-box;
}

button {
    width: 100%;
    margin-top: 40px;
    padding: 24px;
    border: none;
    border-radius: 999px;
    background: #18b7c5;
    color: #0b6662;
    font-size: 28px;
    font-weight: 700;
    cursor: pointer;
}

button:hover {
    opacity: 0.92;
}

.footer-text {
    margin-top: 50px;
    font-size: 22px;
}

#responseMessage {
    margin-top: 25px;
    font-size: 18px;
    font-weight: bold;
}
</style>
</head>
<body>

<section class="hero">
    <h1>The Future of Personal Cloud is Private.</h1>

    <p class="subtitle">
        Own your memories, files, and digital life — privately, beautifully, and without any monthly subscriptions.
    </p>

    <div class="waitlist-box">
        <h2>Join the private waitlist</h2>

        <form id="waitlistForm">
            <label>Where should we send your invite?</label>

            <input
                type="email"
                id="email"
                required
                placeholder="Enter your email"
            >

            <button type="submit">Request Early Access</button>
        </form>

        <div id="responseMessage"></div>
    </div>

    <p class="footer-text">
        We’ll send only launch updates and your early access invite — nothing else.
    </p>
</section>

<script>
document.getElementById("waitlistForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;

    const response = await fetch("http://localhost:5678/webhook-test/nestcloud-waitlist", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ email })
    });

    const data = await response.json();

    document.getElementById("responseMessage").innerHTML =
        data.message;
});
</script>

</body>
</html>
